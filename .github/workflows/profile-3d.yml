name: 3D Contribution Graph

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    name: Generate 3D Contribution Graph

    steps:
      - uses: actions/checkout@v4

      - name: Write settings.json
        run: |
          mkdir -p profile-3d-contrib
          cat > profile-3d-contrib/settings.json << 'EOL'
          {
            "type": "rainbow",
            "fileName": "profile-night-rainbow.svg",
            "backgroundColor": "#00000f",
            "foregroundColor": "#eeeeff",
            "strongColor": "rgb(255,200,55)",
            "weakColor": "#aaaaaa",
            "radarColor": "rgb(255,200,55)",
            "saturation": "50%",
            "contribLightness": ["20%", "30%", "35%", "40%", "50%"],
            "duration": "10s",
            "hueRatio": -7
          }
          EOL

      - uses: yoshi389111/github-profile-3d-contrib@latest
        env:
          GITHUB_TOKEN: ${{ secrets.TOKEN }}
          USERNAME: ${{ github.repository_owner }}
          SETTING_JSON: profile-3d-contrib/settings.json

      - name: Commit and push
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add -A .
          git commit -m "Update 3D contribution graph" || exit 0
          git remote set-url origin https://x-access-token:${{ secrets.TOKEN }}@github.com/${{ github.repository }}.git
          git push origin HEAD:main --force
